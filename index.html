  * { box-sizing: border-box; margin: 0; padding: 0; }

    color: #1a1a1a;
    padding: 36px 24px;
    min-height: 100vh;
  }
  .header { margin-bottom: 28px; }
  .header h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.3px; }
  .header p { font-size: 13px; color: #888; margin-top: 5px; }

  .controls {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin-bottom: 16px;
  }
  .controls input[type="text"] {
    padding: 7px 12px; border: 1px solid #ddd; border-radius: 7px;
    font-size: 13px; width: 210px; outline: none; background: #fff;
  }
  .controls input[type="text"]:focus { border-color: #aaa; }
  .controls select {
    padding: 7px 10px; border: 1px solid #ddd; border-radius: 7px;
    font-size: 13px; background: #fff; cursor: pointer; outline: none;
  }
  .count { margin-left: auto; font-size: 12px; color: #aaa; }

  /* Batch buttons */
  .batch-bar {
    display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; align-items: center;
  }
  .batch-bar .label { font-size: 12px; color: #888; margin-right: 4px; }
  .batch-btn {
    padding: 5px 11px; border-radius: 6px; border: 1px solid #ddd;
    background: #fff; font-size: 12px; font-weight: 500; color: #333;
    cursor: pointer; transition: background 0.1s, border-color 0.1s;
  }
  .batch-btn:hover { background: #f0f0f0; border-color: #bbb; }
  .batch-btn.has-urls { border-color: #0a66c2; color: #0a66c2; }
  .batch-btn.has-urls:hover { background: #e8f0fe; }

  /* Batch divider row */
  tr.batch-divider td {
    background: #f5f5f3; font-size: 11px; font-weight: 600; color: #999;
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: 5px 14px; border-top: 2px solid #e4e4e0;
    border-bottom: 1px solid #e4e4e0;
  }

  .table-wrap {
    overflow-x: auto; border-radius: 10px;
    border: 1px solid #e4e4e0; background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: #fafaf8; font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.05em; color: #888;
    padding: 10px 14px; text-align: left; border-bottom: 1px solid #e4e4e0;
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  thead th:hover { color: #333; }
  thead th .si { margin-left: 3px; opacity: 0.35; font-size: 10px; }
  thead th.sorted .si { opacity: 1; }
  tbody tr { border-bottom: 1px solid #f2f2f0; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafaf8; }
  td { padding: 9px 14px; vertical-align: middle; }

  /* LinkedIn icon cell */
  .li-cell { width: 40px; text-align: center; }
  .li-icon-link { display: inline-flex; align-items: center; justify-content: center; opacity: 0.85; transition: opacity 0.15s; }
  .li-icon-link:hover { opacity: 1; }
  .no-link-icon { opacity: 0.15; }

  /* Event badge */
  .ev { display:inline-block; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:500; white-space:nowrap; }
  .ev-mini   { background:#e8f0fe; color:#1a56c9; }
  .ev-novata { background:#fef3e2; color:#b45309; }
  .ev-both   { background:#f0fdf4; color:#166534; }

  /* Name */
  .name { font-weight: 500; }

  /* Status */
  .sp { display:inline-block; padding:2px 7px; border-radius:20px; font-size:11px; font-weight:500; }
  .sp-confirmed { background:#dcfce7; color:#15803d; }
  .sp-guessed   { background:#fef9c3; color:#854d0e; }
  .sp-na        { background:#f1f5f9; color:#94a3b8; }

  /* Type */
  .tp { display:inline-block; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:500; white-space:nowrap; }
  .tp-vc         { background:#ede9fe; color:#5b21b6; }
  .tp-lp         { background:#dbeafe; color:#1e40af; }
  .tp-impact     { background:#d1fae5; color:#065f46; }
  .tp-investor   { background:#e0f2fe; color:#0369a1; }
  .tp-policy     { background:#fce7f3; color:#9d174d; }
  .tp-academic   { background:#fef3c7; color:#92400e; }
  .tp-consultant { background:#f3f4f6; color:#374151; }
  .tp-unknown    { background:#f8fafc; color:#94a3b8; }

  /* Batch popover */
  .batch-wrap { position: relative; display: inline-block; }
  .batch-popover {
    display: none; position: absolute; top: calc(100% + 6px); left: 0;
    background: #fff; border: 1px solid #ddd; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 6px 0;
    min-width: 220px; max-height: 320px; overflow-y: auto;
    z-index: 100;
  }
  .batch-popover.open { display: block; }
  .batch-popover a {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; font-size: 13px; color: #1a1a1a;
    text-decoration: none; white-space: nowrap;
  }
  .batch-popover a:hover { background: #f5f5f3; }
  .batch-popover a svg { flex-shrink: 0; }
  .batch-popover .pop-header {
    padding: 5px 14px 6px; font-size: 11px; font-weight: 600;
    color: #aaa; text-transform: uppercase; letter-spacing: 0.05em;
    border-bottom: 1px solid #f0f0ee; margin-bottom: 2px;
  }
</style>

let sortCol = -1, sortAsc = true;
function sort(col) {
  sortAsc = sortCol === col ? !sortAsc : true;
  sortCol = col;
  document.querySelectorAll('thead th').forEach((th,i) => {
    th.classList.toggle('sorted', i === col);
    const s = th.querySelector('.si');
    if (s) s.textContent = i===col?(sortAsc?'↑':'↓'):'↕';
  });
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const ef = document.getElementById('evtF').value;
  const tf = document.getElementById('typF').value;
  const sf = document.getElementById('stF').value;

    const [,name,evts,,status,type] = r;
    if (q && !name.toLowerCase().includes(q)) return false;
    if (ef === 'both' && !evts.includes(';')) return false;
    if (ef === 'Mini-FRAME' && (evts.includes(';') || !evts.includes('Mini-FRAME'))) return false;
    if (ef === 'Novata' && (evts.includes(';') || !evts.includes('Novata'))) return false;
    if (tf && type !== tf) return false;
    if (sf && status !== sf) return false;
    return true;
  });

  const evtOrder = r => r[2].includes(';') ? 0 : r[2].includes('Mini-FRAME') ? 1 : 2;
  const typeOrder = ['VC','LP','Impact Investor','Investor','Policy/NGO','Academic/Research','Consultant/Advisor','Unknown'];
  const stOrder = r => r[4]==='Confirmed'?0:r[4]==='Guessed'?1:2;

  if (sortCol >= 0) {
    rows = [...rows].sort((a,b) => {
      const av=a[sortCol]||'', bv=b[sortCol]||'';
      return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  } else {

      const ed = evtOrder(a) - evtOrder(b); if (ed) return ed;
      const td = typeOrder.indexOf(a[5]) - typeOrder.indexOf(b[5]); if (td) return td;
      return stOrder(a) - stOrder(b);
    });

  const BATCH = 10;
  let html = '';
  rows.forEach((r, i) => {
    const [, name, evts, url, status, type] = r;
    // Insert batch divider at start of each group of 10
    if (i % BATCH === 0) {
      const batchNum = Math.floor(i / BATCH) + 1;
      const end = Math.min(i + BATCH, rows.length);
      html += `<tr class="batch-divider"><td colspan="5">Batch ${batchNum} &nbsp;·&nbsp; rows ${i+1}–${end}</td></tr>`;
    }
    const liHtml = url
      ? `<a class="li-icon-link" href="${url.startsWith('http')?url:'https://'+url}" target="_blank" rel="noopener" title="${name} on LinkedIn">${liIcon}</a>`
      : `<span class="no-link-icon">${liIcon}</span>`;
    html += `<tr>
      <td class="li-cell">${liHtml}</td>
      <td class="name">${name}</td>
      <td>${evtLabel(evts)}</td>
      <td><span class="sp ${statusClass(status)}">${statusLabel(status)}</span></td>
      <td><span class="tp ${typeClass(type)}">${type}</span></td>
    </tr>`;
  });
  document.getElementById('tbody').innerHTML = html;
  document.getElementById('cnt').textContent = `${rows.length} of ${DATA.length}`;

  // Rebuild batch buttons with popovers
  const bar = document.getElementById('batchBar');
  bar.innerHTML = '<span class="label">Open LI batch:</span>';
  const totalBatches = Math.ceil(rows.length / BATCH);
  const liIconSm = `<svg width="14" height="14" viewBox="0 0 24 24" fill="#0a66c2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`;

  for (let b = 0; b < totalBatches; b++) {
    const slice = rows.slice(b * BATCH, (b + 1) * BATCH);
    const withUrls = slice.filter(r => r[3] && r[3].trim() !== '');

    const wrap = document.createElement('div');
    wrap.className = 'batch-wrap';

    const btn = document.createElement('button');
    btn.className = 'batch-btn' + (withUrls.length > 0 ? ' has-urls' : '');
    btn.textContent = `Batch ${b+1} (${withUrls.length} LI) ▾`;
    btn.disabled = withUrls.length === 0;

    const pop = document.createElement('div');
    pop.className = 'batch-popover';
    pop.innerHTML = `<div class="pop-header">Batch ${b+1} — click to open</div>` +
      withUrls.map(r => {
        const u = r[3].startsWith('http') ? r[3] : 'https://' + r[3];
        return `<a href="${u}" target="_blank" rel="noopener">${liIconSm} ${r[1]}</a>`;
      }).join('');

    btn.onclick = (e) => {
      e.stopPropagation();
      // Close any other open popovers
      document.querySelectorAll('.batch-popover.open').forEach(p => { if (p !== pop) p.classList.remove('open'); });
      pop.classList.toggle('open');
    };

    wrap.appendChild(btn);
    wrap.appendChild(pop);
    bar.appendChild(wrap);
  }

  // Close popovers on outside click
  document.addEventListener('click', () => {
    document.querySelectorAll('.batch-popover.open').forEach(p => p.classList.remove('open'));
  }, { once: false });
}

render();
</script>
</body>
</html>
